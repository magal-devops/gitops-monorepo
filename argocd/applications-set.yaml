apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications-dynamic
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  # Descobrir apenas arquivos de aplicação (não base.yaml)
  - git:
      repoURL: https://github.com/magal-devops/gitops-monorepo.git
      revision: main
      files:
      - path: applications/*/*/app-*.yaml
  template:
    metadata:
      name: '{{.path.filename | replace "app-" "" | replace ".yaml" ""}}-{{index (.path.path | splitList "/") 2}}'
      labels:
        project: '{{index (.path.path | splitList "/") 1}}'
        environment: '{{index (.path.path | splitList "/") 2}}'
        application: '{{.path.filename | replace "app-" "" | replace ".yaml" ""}}'
        team: magal-devops
        managed-by: argocd-applicationset
    spec:
      project: default
      sources:
      # Source 1: Helm Chart
      - repoURL: https://github.com/magal-devops/helm-charts.git
        targetRevision: HEAD
        path: kubernetes
        helm:
          valueFiles:
          - $values/applications/{{index (.path.path | splitList "/") 1}}/{{index (.path.path | splitList "/") 2}}/base.yaml
          - $values/applications/{{index (.path.path | splitList "/") 1}}/{{index (.path.path | splitList "/") 2}}/{{.path.filename}}
      # Source 2: Values repository
      - repoURL: https://github.com/magal-devops/gitops-monorepo.git
        targetRevision: main
        ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{index (.path.path | splitList "/") 1}}-{{index (.path.path | splitList "/") 2}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
        - PrunePropagationPolicy=foreground
        - PruneLast=true
      revisionHistoryLimit: 5 