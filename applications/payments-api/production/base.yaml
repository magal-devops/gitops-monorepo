kubernetes:
  base:
    project: payments-api
    monoRepo:
      url: git@github.com:magal-devops/monorepo-gitops.git
      appsFolder: apps-config
      revision: main
    globalRegistry:
      url: https://index.docker.io/v1/
    deployConfig:
      cluster: https://kubernetes.default.svc
      environment: production
    metadata:
      team: magal-devops
    namespace:
      annotations: {}
  